services:
  - type: web
    name: aura-finance
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: AURA_AI_GEMINI_API_KEY
        sync: false
      - key: AURA_AI_GEMINI_MODEL_NAME
        value: gemini-2.5-flash
      - key: AURA_DB_URL
        sync: false
      - key: AURA_DB_USERNAME
        sync: false
      - key: AURA_DB_PASSWORD
        sync: false
